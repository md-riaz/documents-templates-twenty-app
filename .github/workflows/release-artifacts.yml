name: Release Artifacts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck and test
        run: node ./node_modules/typescript/bin/tsc --outDir dist --rootDir src --module NodeNext --moduleResolution NodeNext --target ES2022 --jsx react-jsx --skipLibCheck && npm test

      - name: Twenty dry-run diagnostic
        continue-on-error: true
        run: yarn twenty dev --once --dry-run
